<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Thi Luật Kinh Doanh Bảo Hiểm Pro (Shuffle Mode)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Marked.js cho Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Typing Indicator */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Markdown Styles */
        .prose p { margin-bottom: 0.75em; line-height: 1.6; }
        .prose ul { list-style-type: disc; padding-left: 1.2em; margin-bottom: 0.75em; }
        .prose strong { color: #4338ca; font-weight: 600; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .option-card:active { transform: scale(0.99); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex flex-col">

        <!-- History Overlay -->

    <script>

        // --- DATA: THEORY QUESTIONS (40 CÂU) ---
        const theoryQuestions = [
            {
                q: "Theo Luật Kinh doanh bảo hiểm, khi xảy ra sự kiện bảo hiểm, doanh nghiệp bảo hiểm phải bồi thường, trả tiền bảo hiểm trong thời hạn bao lâu (nếu không có thỏa thuận)?",

            },
            {
                q: "Theo Luật Kinh doanh bảo hiểm, phát biểu nào sau đây đúng nhất về đại lý bảo hiểm?",

            },
            {

            },
            {
                q: "Theo Luật KDBH, bên mua bảo hiểm có quyền chuyển giao hợp đồng bảo hiểm không?",
                options: ["Bên mua bảo hiểm không có quyền chuyển giao.", "Bên mua bảo hiểm có quyền chuyển giao hợp đồng bảo hiểm.", "Bên mua bảo hiểm có thể chuyển giao cho bất kỳ người nào."],
                correct: 1,
                explanation: "Luật cho phép chuyển giao hợp đồng bảo hiểm theo quy định cụ thể của từng loại hình."
            },
            {
                q: "Chọn phương án đúng nhất về các loại hợp đồng bảo hiểm quy định tại Luật kinh doanh bảo hiểm:",

            },
            {
                q: "Rủi ro thuần túy là rủi ro có hậu quả:",
                options: ["Liên quan đến khả năng đầu cơ.", "Liên quan đến khả năng tổn thất.", "Liên quan đến khả năng đầu cơ và khả năng tổn thất.", "Không phương án nào đúng."],

            },

        // --- APP LOGIC ---
        const app = {
            questions: [],
            currentQuestions: [], // Loaded based on mode
            currentIndex: 0,
            score: 0,
            userAnswers: [],
            history: JSON.parse(localStorage.getItem('quizHistory')) || [],
            mode: 'theory', // 'theory' or 'calculation'

            init: function() {
                this.renderHistory();
                
                // Chat input enter
                document.getElementById('chat-input').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') app.sendChatMessage();
                });
            },

            startQuiz: function(selectedMode) {
                this.mode = selectedMode;
                // Deep Copy & Shuffle Questions
                let sourceData = (this.mode === 'calculation') ? calculationQuestions : theoryQuestions;
                
                // Clone deeply to avoid modifying original when shuffling options
                let questions = JSON.parse(JSON.stringify(sourceData));
                
                // 1. Shuffle Order of Questions
                this.currentQuestions = this.shuffleArray(questions);
                
                // 2. Shuffle Options within each Question
                this.currentQuestions.forEach(q => {
                    // Create pairs of [optionText, originalIndex]
                    let mappedOptions = q.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                    
                    // Shuffle these pairs
                    this.shuffleArray(mappedOptions);
                    
                    // Update question's options to new shuffled order
                    q.options = mappedOptions.map(m => m.text);
                    
                    // Update 'correct' index to point to where the correct answer moved
                    // q.correct was the original index (e.g. 1). We look for which item has originalIndex == 1
                    q.correct = mappedOptions.findIndex(m => m.originalIndex === q.correct);
                });

                if(this.mode === 'calculation') {
                    document.getElementById('quiz-mode-label').innerText = "Tiến độ (Phần Tính Toán)";
                } else {
                    document.getElementById('quiz-mode-label').innerText = "Tiến độ (Phần Lý Thuyết)";
                }

                this.currentIndex = 0;
                this.score = 0;
                this.userAnswers = new Array(this.currentQuestions.length).fill(null);
                
                // Switch Screens
                document.getElementById('screen-welcome').classList.add('hidden');
                document.getElementById('screen-result').classList.add('hidden');
                document.getElementById('screen-quiz').classList.remove('hidden');

                this.renderQuestion();
                this.updateProgress();
            },

            renderQuestion: function() {
                const q = this.currentQuestions[this.currentIndex];
                document.getElementById('question-text').innerText = `Câu ${this.currentIndex + 1}: ${q.q}`;
                
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';

                // Reset UI
                const feedbackArea = document.getElementById('feedback-area');
                feedbackArea.classList.add('hidden');
                
                document.getElementById('ai-explanation-content').classList.add('hidden');
                document.getElementById('ai-explanation-content').innerHTML = '';
                document.getElementById('ai-explain-btn-container').classList.remove('hidden');

                const btnNext = document.getElementById('btn-next');
                btnNext.disabled = true;
                btnNext.classList.add('opacity-50', 'cursor-not-allowed');

                q.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = "option-card w-full text-left p-4 rounded-xl border border-slate-200 bg-white hover:border-primary-400 hover:shadow-md hover:bg-slate-50 transition relative group flex items-start gap-3";
                    
                    btn.innerHTML = `
                        <div class="w-7 h-7 rounded-lg bg-slate-100 text-slate-500 font-bold text-sm flex items-center justify-center shrink-0 group-hover:bg-primary-100 group-hover:text-primary-600 transition-colors">
                            ${String.fromCharCode(65 + index)}
                        </div>
                        <span class="text-slate-700 text-sm md:text-base leading-relaxed font-medium group-hover:text-slate-900">${opt}</span>
                    `;
                    
                    btn.onclick = () => this.checkAnswer(index, btn);
                    optionsContainer.appendChild(btn);
                });
            },

            checkAnswer: function(selectedIndex, btnElement) {
                if (this.userAnswers[this.currentIndex] !== null) return;

                const q = this.currentQuestions[this.currentIndex];
                const isCorrect = selectedIndex === q.correct;
                this.userAnswers[this.currentIndex] = isCorrect ? 'correct' : 'wrong';

                const options = document.getElementById('options-container').children;
                for (let i = 0; i < options.length; i++) {
                    options[i].disabled = true;
                    options[i].classList.remove('hover:border-primary-400', 'hover:shadow-md', 'hover:bg-slate-50');
                    options[i].classList.add('opacity-70');

                    if (i === q.correct) {
                        options[i].classList.remove('opacity-70', 'border-slate-200', 'bg-white');
                        options[i].classList.add('bg-green-50', 'border-green-500', 'ring-1', 'ring-green-500');
                        options[i].querySelector('div').classList.replace('bg-slate-100', 'bg-green-500');
                        options[i].querySelector('div').classList.replace('text-slate-500', 'text-white');
                    } else if (i === selectedIndex && !isCorrect) {
                        options[i].classList.remove('opacity-70', 'border-slate-200', 'bg-white');
                        options[i].classList.add('bg-red-50', 'border-red-500', 'ring-1', 'ring-red-500');
                        options[i].querySelector('div').classList.replace('bg-slate-100', 'bg-red-500');
                        options[i].querySelector('div').classList.replace('text-slate-500', 'text-white');
                    }
                }

                if (isCorrect) this.score++;
                this.updateProgress();

                // Show Feedback & Explanation
                const feedbackArea = document.getElementById('feedback-area');
                const feedbackCard = document.getElementById('feedback-card');
                const feedbackTitle = document.getElementById('feedback-title');
                const feedbackText = document.getElementById('feedback-text');
                const feedbackIcon = document.getElementById('feedback-icon');

                feedbackArea.classList.remove('hidden');
                
                if (isCorrect) {
                    feedbackCard.className = "rounded-2xl border p-5 mb-4 shadow-sm bg-green-50/50 border-green-200";
                    feedbackIcon.innerHTML = '<i class="fas fa-check-circle text-green-500"></i>';
                    feedbackTitle.innerText = "Chính xác!";
                    feedbackTitle.className = "font-bold text-base mb-1 text-green-700";
                } else {
                    feedbackCard.className = "rounded-2xl border p-5 mb-4 shadow-sm bg-red-50/50 border-red-200";
                    feedbackIcon.innerHTML = '<i class="fas fa-times-circle text-red-500"></i>';
                    feedbackTitle.innerText = "Chưa chính xác";
                    feedbackTitle.className = "font-bold text-base mb-1 text-red-700";
                }
                
                // Use Marked for Markdown rendering in explanation
                feedbackText.innerHTML = q.explanation ? marked.parse(q.explanation) : "Không có giải thích chi tiết.";

                const btnNext = document.getElementById('btn-next');
                btnNext.disabled = false;
                btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
                setTimeout(() => btnNext.scrollIntoView({behavior: "smooth", block: "center"}), 100);
            },

            // --- AI & NAVIGATION ---
            explainWithAI: async function() {
                const btnContainer = document.getElementById('ai-explain-btn-container');
                const contentDiv = document.getElementById('ai-explanation-content');
                const q = this.currentQuestions[this.currentIndex];
                const correctAnswerText = q.options[q.correct];

                btnContainer.classList.add('hidden');
                contentDiv.classList.remove('hidden');
                contentDiv.innerHTML = '<div class="flex items-center gap-2 justify-center text-primary-500"><div class="typing-dot w-2 h-2 bg-current rounded-full"></div><div class="typing-dot w-2 h-2 bg-current rounded-full"></div><div class="typing-dot w-2 h-2 bg-current rounded-full"></div></div>';

                const prompt = `Bạn là chuyên gia. Giải thích câu hỏi: "${q.q}". Đáp án đúng: "${correctAnswerText}".`;
                const result = await callGemini(prompt);
                
                if (result) {
                    contentDiv.innerHTML = marked.parse(result);
                } else {
                    btnContainer.classList.remove('hidden');
                    contentDiv.classList.add('hidden');
                }
            },

            nextQuestion: function() {
                if (this.currentIndex < this.currentQuestions.length - 1) {
                    this.currentIndex++;
                    this.renderQuestion();
                    this.updateProgress();
                    document.querySelector('.overflow-y-auto').scrollTop = 0;
                } else {
                    this.finishQuiz();
                }
            },

            updateProgress: function() {
                document.getElementById('question-counter').innerText = `${this.currentIndex + 1}/${this.currentQuestions.length}`;
                document.getElementById('score-counter').innerText = `${this.score} Điểm`;
                const pct = ((this.currentIndex + (this.userAnswers[this.currentIndex] !== null ? 1 : 0)) / this.currentQuestions.length) * 100;
                document.getElementById('progress-bar').style.width = `${pct}%`;
            },

            finishQuiz: function() {
                // Save History with Mode
                const result = {
                    date: new Date().toLocaleString('vi-VN'),
                    score: this.score,
                    total: this.currentQuestions.length,
                    timestamp: Date.now(),
                    mode: this.mode === 'calculation' ? 'Tính toán' : 'Lý thuyết'
                };
                
                this.history.unshift(result);
                if (this.history.length > 20) this.history.pop();
                localStorage.setItem('quizHistory', JSON.stringify(this.history));
                this.renderHistory();

                document.getElementById('screen-quiz').classList.add('hidden');
                document.getElementById('screen-result').classList.remove('hidden');

                document.getElementById('final-score').innerText = this.score;
                document.getElementById('total-questions-label').innerText = `trên ${this.currentQuestions.length} câu`;
                
                const percentage = (this.score / this.currentQuestions.length) * 100;
                const circle = document.getElementById('score-circle');
                const offset = 283 - (283 * percentage / 100);
                setTimeout(() => circle.style.strokeDashoffset = offset, 100);
            },

            returnHome: function() {
                document.getElementById('screen-result').classList.add('hidden');
                document.getElementById('screen-welcome').classList.remove('hidden');
            },

            // --- UTILS ---
            toggleHistory: function() {
                const h = document.getElementById('screen-history');
                h.classList.toggle('translate-x-full');
            },

            toggleChat: function() {
                const chat = document.getElementById('screen-chat');
                if (window.innerWidth < 768) {
                    chat.classList.toggle('translate-y-full');
                } else {
                    chat.classList.toggle('hidden');
                    chat.classList.toggle('flex');
                }
            },

            sendChatMessage: async function() {
                const input = document.getElementById('chat-input');
                const msg = input.value.trim();
                if (!msg) return;

                const messagesContainer = document.getElementById('chat-messages');
                const userDiv = document.createElement('div');
                userDiv.className = "flex items-end justify-end gap-2 animate-fade-in";
                userDiv.innerHTML = `<div class="bg-primary-600 text-white rounded-2xl rounded-tr-none p-3 text-sm max-w-[85%] shadow-sm">${msg}</div>`;
                messagesContainer.appendChild(userDiv);
                
                input.value = '';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                const loadingDiv = document.createElement('div');
                loadingDiv.innerHTML = '...'; 
                messagesContainer.appendChild(loadingDiv);

                const prompt = `Bạn là trợ lý ảo Luật Bảo hiểm. Trả lời: "${msg}"`;
                const reply = await callGemini(prompt);
                loadingDiv.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = "flex items-start gap-3 animate-fade-in";
                aiDiv.innerHTML = `<div class="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 text-sm text-slate-700 max-w-[90%]">${reply ? marked.parse(reply) : "Lỗi."}</div>`;
                messagesContainer.appendChild(aiDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            },

            clearHistory: function() {
                if(confirm('Xóa toàn bộ lịch sử?')) {
                    this.history = [];
                    localStorage.removeItem('quizHistory');
                    this.renderHistory();
                }
            },

            renderHistory: function() {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                
                if (this.history.length === 0) {
                    list.innerHTML = '<li class="text-center text-slate-400 italic text-sm">Chưa có dữ liệu</li>';
                    return;
                }

                this.history.forEach((h, index) => {
                    const li = document.createElement('li');
                    li.className = "bg-white p-3 rounded-xl border border-slate-100 flex justify-between items-center";
                    const pct = Math.round((h.score / h.total) * 100);
                    let colorClass = pct >= 80 ? 'text-green-600' : 'text-slate-600';
                    
                    li.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-700 text-sm flex items-center gap-2">
                                ${h.mode === 'Tính toán' ? '<i class="fas fa-calculator text-orange-500"></i>' : '<i class="fas fa-book text-blue-500"></i>'}
                                Lần ${this.history.length - index}
                            </div>
                            <div class="text-[10px] text-slate-400 font-medium">${h.date}</div>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-bold ${colorClass}">${h.score}/${h.total}</span>
                        </div>
                    `;
                    list.appendChild(li);
                });
            },

            shuffleArray: function(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            },

            // --- API Helper (Embedded for closure access) ---
            callGemini: async function(prompt) { return callGemini(prompt); }
        };

        // --- GEMINI API HELPER (Global) ---
        async function callGemini(prompt) {
            if (!apiKey) {
                // Silently fail or alert only once in real app
                return "Vui lòng nhập API Key trong code để sử dụng AI.";
            }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) { return "Lỗi kết nối AI."; }
        }

        app.init();
    </script>
</body>
</html>
